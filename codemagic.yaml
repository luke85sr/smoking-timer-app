workflows:
  build-app:
    name: Build APK & AAB
    max_build_duration: 60
    environment:
      node: 18.18.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build APK & AAB
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
