workflows:
  build-app:
    name: Build APK & AAB
    max_build_duration: 60
    environment:
      node: 18.16.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build APK & AAB
        script: |
          npx expo install
          npx eas build --platform android --profile production --non-interactive
    artifacts:
      - build/**/*.apk
      - build/**/*.aab
