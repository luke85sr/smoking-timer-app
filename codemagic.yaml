workflows:
  build-app:
    name: Build APK with classic Expo
    environment:
      node: 18
      npm: 9
      groups:
        - eas       # il tuo gruppo con dentro EXPO_TOKEN (serve per installare eventuali CLI)
    max_build_duration: 30  # timeout in minuti, puoi aggiustare se serve più tempo

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Expo CLI
        script: npm install -g expo-cli

      - name: Run classic Expo build
        script: npx expo build:android --no-publish --no-wait

    artifacts:
      - android/app/build/outputs/**/*.apk
