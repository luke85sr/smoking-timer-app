workflows:
  build-app:
    name: Build APK & AAB with EAS
    environment:
      node: 18
      npm: 9
      groups:
        - eas

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Run EAS build & download artifacts
        script: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --output ./build

    artifacts:
      - build/*.apk
      - build/*.aab

