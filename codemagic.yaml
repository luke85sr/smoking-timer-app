workflows:
  expo_debug_apk:
    name: Expo Debug APK Build
    environment:
      node: 18.18.0
      npm: 9.5.1
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Install Expo & EAS CLI
        script: |
          npm install -g expo-cli eas-cli
      - name: Build APK (debug)
        script: |
          eas build --platform android --profile development --non-interactive
    artifacts:
      - build/**/*.apk
