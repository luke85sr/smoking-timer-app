workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      groups:
        - eas        # qui viene caricato il group “eas” con EXPO_TOKEN

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI
        script: npm install -g eas-cli

      # se usi bare workflow, decommenta:
      # - name: Expo prebuild
      #   script: npx expo prebuild --platform android --no-install

      - name: Run EAS build
        # EAS CLI userà automaticamente il token $EXPO_TOKEN
        script: eas build -p android --profile production --non-interactive

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
