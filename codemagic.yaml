workflows:
  build-app:
    name: Build & Download with EAS
    environment:
      node: 18
      npm: 9
      groups:
        - eas   # deve contenere EXPO_TOKEN

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Run EAS build
        script: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive

      - name: Download APK/AAB artifact
        script: |
          mkdir -p build
          # Estrae l'URL dal JSON prodotto da `eas build:list`
          URL=$(eas build:list \
            --json \
            --limit 1 \
            --platform android \
            --non-interactive 2>/dev/null \
            | sed -n 's/.*"buildUrl":[[:space:]]*"\([^"]*\)".*/\1/p')
          EXT="${URL##*.}"
          echo "Scarico artefatto da $URL"
          curl -L "$URL" -o "build/app.$EXT"

    artifacts:
      - build/*.apk
      - build/*.aab

