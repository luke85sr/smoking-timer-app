workflows:
  build-app:
    name: Build APK & AAB with EAS
    environment:
      node: 18
      npm: 9
      groups:
        - eas   # deve contenere EXPO_TOKEN

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Login to EAS
        script: |
          # se EXPO_TOKEN è già in env var questo fa il login
          eas login --token $EXPO_TOKEN

      - name: Run EAS build
        script: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive

      - name: Download build artifacts
        script: |
          # scarica l'ultimo build completato per Android
          eas build:download \
            --platform android \
            --latest \
            --output ./build

    artifacts:
      - build/*.apk
      - build/*.aab

