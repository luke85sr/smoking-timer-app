workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      groups:
        - eas
    scripts:
      - npm install
      # se stai usando il bare workflow Expo:
      # - npx expo prebuild --platform android --no-install
      - eas build -p android --profile production --non-interactive
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
