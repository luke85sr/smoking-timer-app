workflows:
  build-app:
    name: Build APK & AAB with Expo
    max_build_duration: 60
    environment:
      node: 18.18.0
      java: 17
      vars:
        EXPO_TOKEN: NKe6AbsLQZh59HSAMZD-I1IOxxpR_EslQn2ZHWD1
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Install Expo CLI and EAS CLI
        script: |
          npm install -g expo-cli eas-cli
      - name: Build APK & AAB
        script: |
          expo install
          eas build --platform android --profile production --non-interactive
    artifacts:
      - build/**/app-*.apk
      - build/**/app-*.aab
