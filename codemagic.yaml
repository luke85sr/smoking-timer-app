workflows:
  react-native-bare-android:
    name: React Native Bare Android Build
    environment:
      node: 18
      java: 17
      groups:
        - eas
    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Clean Gradle
        script: |
          cd android
          ./gradlew clean

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

      - name: Rename Artifacts
        script: |
          VERSION_NAME=$(grep versionName android/app/build.gradle | awk '{print $2}' | tr -d '"')
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/SmokingTimer_v$VERSION_NAME.apk
          mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/SmokingTimer_v$VERSION_NAME.aab

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules
