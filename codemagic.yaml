workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      # dichiariamo il nostro secret EXPO_TOKEN
      secrets:
        - EXPO_TOKEN

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install EAS CLI
        script: npm install -g eas-cli

      # se usi bare workflow, decommenta:
      # - name: Expo prebuild
      #   script: npx expo prebuild --platform android --no-install

      - name: Run EAS build
        # EAS cercherà la variabile EXPO_TOKEN in ambiente
        script: eas build -p android --profile production --non-interactive

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
