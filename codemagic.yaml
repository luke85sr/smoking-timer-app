workflows:
  build-app:
    name: Build APK with classic Expo
    environment:
      node: 18
      npm: 9
      # non serve più il gruppo “eas” né EXPO_TOKEN
    max_build_duration: 30  # min

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install legacy Expo CLI
        script: npm install -g expo-cli@^4

      - name: Run classic Expo build
        script: expo-cli build:android -t apk --no-publish --non-interactive

    artifacts:
      # il builder classico deposita gli apk in ./dist
      - dist/**/*.apk
