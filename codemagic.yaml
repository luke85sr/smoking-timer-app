workflows:
  react-native-bare-android:
    name: React Native Bare Android Build
    environment:
      node: 18
      java: 17
      groups:
        - eas # CONTIENE IL TUO CODEMAGIC_TOKEN
    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Clean Gradle
        script: |
          cd android
          ./gradlew clean

      - name: Fallback metro.config.js se mancante
        script: |
          if [ ! -f metro.config.js ]; then
            echo "✅ Creazione fallback metro.config.js"
            cat <<'EOT' > metro.config.js
const { getDefaultConfig } = require('metro-config');
module.exports = (async () => {
  const {
    resolver: { sourceExts, assetExts }
  } = await getDefaultConfig();
  return {
    transformer: {
      babelTransformerPath: require.resolve('react-native-svg-transformer')
    },
    resolver: {
      assetExts: assetExts.filter(ext => ext !== 'svg'),
      sourceExts: [...sourceExts, 'svg']
    }
  };
})();
EOT
          fi

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

      - name: Rename APK/AAB artifacts
        script: |
          DATE=$(date +%Y%m%d-%H%M)
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/smoking-timer-$DATE.apk || true
          mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/smoking-timer-$DATE.aab || true

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules
