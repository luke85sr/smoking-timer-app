workflows:
  react-native-bare-android:
    name: React Native Bare Android Build
    environment:
      node: 18
      java: 17
      groups:
        - eas # contiene il tuo CODEMAGIC_TOKEN
    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Clean Gradle
        script: |
          cd android
          ./gradlew clean

      - name: Fallback react-native.config.js se mancante
        script: |
          if [ ! -f react-native.config.js ]; then
            echo "✅ Creazione fallback react-native.config.js"
            echo "module.exports = { project: { android: { packageName: 'com.luke85sr.smokingtimer' } } };" > react-native.config.js
          fi

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules
