workflows:
  build-app:
    name: Build & Download with EAS
    environment:
      node: 18
      npm: 9
      groups:
        - eas

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Run EAS build
        script: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive

      - name: Download APK/AAB artifact
        script: |
          mkdir -p build
          # Estrae l'URL dal JSON (anche se qualche riga extra viene emessa)
          URL=$(eas build:list \
            --json \
            --limit 1 \
            --platform android \
            --non-interactive \
            | grep -Po '"buildUrl":\s*"\K[^"]+')
          # Prende l'estensione (.apk o .aab)
          EXT="${URL##*.}"
          echo "Scarico artefatto da $URL"
          curl -L "$URL" -o "build/app.$EXT"

    artifacts:
      - build/*.apk
      - build/*.aab

