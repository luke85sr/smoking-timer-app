workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      groups:
        - eas        # <- il nome del tuo variable group su Codemagic

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Expo & EAS CLI
        script: npm install -g expo-cli eas-cli

      # se usi bare workflow, decommenta la linea qui sotto:
      # - name: Expo prebuild
      #   script: npx expo prebuild --platform android --no-install

      - name: Run EAS build
        script: eas build -p android --profile production --non-interactive

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
