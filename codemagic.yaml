workflows:
  expo_managed_build:
    name: Expo Managed Workflow Build
    environment:
      node: 18.18.0
      npm: 9.5.1
      expo_cli_version: latest
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Install Expo & EAS CLI
        script: |
          npm install -g expo-cli eas-cli
      - name: Run EAS build
        script: |
          eas build --platform android --non-interactive
    artifacts:
      - build/**/*.apk
      - build/**/*.aab
    cache:
      paths:
        - ~/.npm
        - ~/.expo
