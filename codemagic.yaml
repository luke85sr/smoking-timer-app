workflows:
  react-native-bare-android:
    name: React Native Bare Android Build
    environment:
      node: 18
      java: 17
      groups:
        - eas
    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Run React Native Autolinking
        script: |
          npx react-native autolink

      - name: Clean Gradle
        script: |
          cd android
          ./gradlew clean

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules
