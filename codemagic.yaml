workflows:
  react-native-bare-android:
    name: React Native Bare Android Build
    environment:
      node: 18
      java: 17
      groups:
        - eas # contiene il tuo CodeMagic Token
    scripts:
      - name: Verifica react-native.config.js
        script: |
          if [ ! -f react-native.config.js ]; then
            echo "❌ react-native.config.js mancante!"
            exit 1
          fi
          if ! grep -q "androidPackageName" react-native.config.js; then
            echo "❌ androidPackageName mancante in react-native.config.js!"
            exit 1
          fi
          echo "✅ react-native.config.js trovato e valido"

      - name: Install dependencies
        script: |
          npm ci

      - name: Clean Gradle
        script: |
          cd android
          ./gradlew clean

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules
