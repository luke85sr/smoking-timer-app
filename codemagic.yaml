workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      expo-cli: latest
      eas-cli: latest
    scripts:
      - npm install
      - eas build -p android --profile production --non-interactive
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      expo:
        release_channel: production
        app: luke85sr/SmokingTimer
