workflows:
  build-app:
    name: Build APK & AAB with Expo
    environment:
      node: 18
      npm: 9
      groups:
        - your-variable-group-name   # <- nome del tuo variable group (dove hai messo EXPO_TOKEN)
    scripts:
      - npm install
      - npm install -g expo-cli eas-cli
      - eas build -p android --profile production --non-interactive --token $EXPO_TOKEN
      - expo publish --release-channel production
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
