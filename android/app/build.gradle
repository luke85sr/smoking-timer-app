apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.luke85sr.smokingtimer" // ✅ Deve combaciare col packageName
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.luke85sr.smokingtimer" // ✅ Deve combaciare col namespace
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion" // ✅ corretto camelCase
}

// 🔥 Patch estrema: disabilita autolinking tasks in CI (Codemagic)
afterEvaluate {
    if (System.getenv("CI") == "true") {
        tasks.matching {
            it.name == "generateAutolinkingPackageList" || it.name == "generateReactNativeEntryPoint"
        }.configureEach {
            enabled = false
            println("⚡ Patch: Disabilitato task ${it.name} in CI")
        }
    }
}
