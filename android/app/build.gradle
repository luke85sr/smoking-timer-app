apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.smokingtimer"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.smokingtimer"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
}

// 👇 Workaround definitivo per autolinking task
gradle.projectsEvaluated {
    tasks.findAll {
        it.name == "generateAutolinkingPackageList" ||
        it.name == "generateAutolinkingNewArchitectureFiles"
    }.each { it.enabled = false }
}
